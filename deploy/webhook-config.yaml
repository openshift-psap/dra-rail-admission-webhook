apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: dra-gpu-nic-webhook
webhooks:
- name: gpu-nic-pairs.dra.llm-d.io
  admissionReviewVersions: ["v1"]
  sideEffects: NoneOnDryRun
  clientConfig:
    service:
      name: dra-gpu-nic-webhook
      namespace: dra-webhook-system
      path: /mutate
      port: 443
    caBundle: 
  rules:
  - operations: ["CREATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
  namespaceSelector:
    matchLabels:
      dra.llm-d.io/webhook-enabled: "true"
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  timeoutSeconds: 10
