apiVersion: v1
kind: ConfigMap
metadata:
  name: dra-gpu-nic-webhook-config
  namespace: dra-webhook-system
data:
  config.yaml: |
    maxPairsPerNUMA: 4
    maxPairsPerNode: 8
    gpuDeviceClassName: gpu.nvidia.com
    nicDeviceClassName: dranet
    nicConfig:
      mtu: 9000
      rdmaRequired: true
      interfacePrefix: "net"
      startingTableId: 100
      rails:
        - subnet: "10.0.0.0/16"
          gateway: "10.0.0.1"
          ipv4Prefix: "10.0."
        - subnet: "10.1.0.0/16"
          gateway: "10.1.0.1"
          ipv4Prefix: "10.1."
        - subnet: "10.2.0.0/16"
          gateway: "10.2.0.1"
          ipv4Prefix: "10.2."
        - subnet: "10.3.0.0/16"
          gateway: "10.3.0.1"
          ipv4Prefix: "10.3."
        - subnet: "10.4.0.0/16"
          gateway: "10.4.0.1"
          ipv4Prefix: "10.4."
        - subnet: "10.5.0.0/16"
          gateway: "10.5.0.1"
          ipv4Prefix: "10.5."
        - subnet: "10.6.0.0/16"
          gateway: "10.6.0.1"
          ipv4Prefix: "10.6."
        - subnet: "10.7.0.0/16"
          gateway: "10.7.0.1"
          ipv4Prefix: "10.7."
    # Experimental: pre-flight check reads ResourceSlices to verify
    # device availability before admitting pods. Adds admission latency
    # but gives immediate denial with descriptive error instead of
    # leaving pods stuck in Pending.
    preflightCheck: false
    # pairingMode: "pcieRootOnly"
    # Uses pcieRoot MatchAttribute matching without NUMA constraints.
    # Useful on clusters where NUMA locality is not required but
    # GPU-NIC PCIe affinity still matters.
  reconciler.yaml: |
    # How often to check for orphaned resources
    interval: "5m"
    # Auto-delete orphaned resources after grace period
    autoReap: false
    # How long an orphan must be detected before auto-reaping
    gracePeriod: "10m"
    # How long to keep reaped records in state before pruning
    pruneAfter: "168h"
    # Path for persistent state file (must be on a PV)
    statePath: "/data/reconciler-state.json"
